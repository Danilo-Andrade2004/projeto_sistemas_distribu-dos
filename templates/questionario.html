<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionário Emocional IFRN</title>
  <link rel="stylesheet" href="css/questionario.css">
</head>
<body>

<header>
  <div class="logo-area">
    <img src="img/logo.png" alt="Logo IFRN">
    <div class="logo-text">
      <strong>IFRN</strong>
      <span>Questionário Emocional<br>Nova Cruz-RN</span>
    </div>
  </div>
  <h1 class="header-title">Questionário Emocional</h1>
  <div class="header-right"></div>
</header>
<div class="divider"></div>

<main>
  <p class="progress-label" id="progress-label">0 de 10 respondidas</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <div id="perguntas-container"></div>

  <div class="comentario-card">
    <h3>💬 Deseja fazer algum comentário?</h3>
    <textarea id="comentario" placeholder="Deixe seu comentário aqui (opcional)..."></textarea>
  </div>

  <button class="btn-enviar" id="btn-enviar" onclick="enviar()">ENVIAR RESPOSTAS</button>
</main>

<footer>IFRN — Campus Nova Cruz · Apoio e Bem-Estar Estudantil</footer>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-emoji">🎉</div>
    <h2>Obrigado!</h2>
    <p>Suas respostas foram enviadas com sucesso.<br>Elas são anônimas e nos ajudam a cuidar melhor de você.</p>
    <button class="modal-btn" onclick="window.location.href='index.html'">Voltar ao início</button>
  </div>
</div>

<script src="js/questionario.js"></script>
</body>
</html>
